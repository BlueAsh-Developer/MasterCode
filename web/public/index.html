<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MasterCode — AI Web Builder</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <!-- Auth Screen -->
  <div id="auth-screen" class="screen">
    <div class="auth-wrap">
      <div class="auth-logo">Master<span>Code</span></div>
      <div class="auth-sub">Cloud AI Agent for Full-Stack Development</div>
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="showTab('login')">Login</button>
        <button class="tab-btn" onclick="showTab('register')">Register</button>
      </div>
      <form id="login-form" class="auth-form" onsubmit="login(event)">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit" class="btn-primary">Sign In</button>
        <div id="login-error" class="form-error"></div>
      </form>
      <form id="register-form" class="auth-form hidden" onsubmit="register(event)">
        <input type="text" id="reg-name" placeholder="Full Name" required>
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-password" placeholder="Password (min 6 chars)" minlength="6" required>
        <button type="submit" class="btn-primary">Create Account</button>
        <div id="reg-error" class="form-error"></div>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" class="hidden">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-logo">Master<span>Code</span></div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
          Dashboard
        </a>
        <a href="#" class="nav-item" data-page="build" onclick="navigate('build')">
          <svg viewBox="0 0 24 24"><path d="M13 2.05v2.02c3.95.49 7 3.85 7 7.93 0 3.21-1.81 6-4.72 7.72L13 17v5h5l-1.22-1.22C19.91 19.07 22 15.76 22 12c0-5.18-3.95-9.45-9-9.95zM11 2.05C5.95 2.55 2 6.82 2 12c0 3.76 2.09 7.07 5.22 8.78L6 22h5V2.05z"/></svg>
          Build
        </a>
        <a href="#" class="nav-item" data-page="chat" onclick="navigate('chat')">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          AI Chat
        </a>
        <a href="#" class="nav-item" data-page="files" onclick="navigate('files')">
          <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
          File Manager
        </a>
        <a href="#" class="nav-item" data-page="credits" onclick="navigate('credits')">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
          Credits
        </a>
        <a href="#" class="nav-item" data-page="settings" onclick="navigate('settings')">
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="credit-badge">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.67 0-1.72 1.39-2.84 3.11-3.21V4h2.67v1.95c1.86.45 2.79 1.86 2.85 3.39H14.3c-.05-1.11-.64-1.87-2.22-1.87-1.5 0-2.4.68-2.4 1.64 0 .84.65 1.39 2.67 1.91s4.18 1.39 4.18 3.91c-.01 1.83-1.38 2.83-3.12 3.16z"/></svg>
          <span id="sidebar-credits">0</span> credits
        </div>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
      </div>
    </aside>

    <!-- Pages -->
    <main id="content">
      <div id="page-dashboard" class="page"></div>
      <div id="page-build" class="page hidden"></div>
      <div id="page-chat" class="page hidden"></div>
      <div id="page-files" class="page hidden"></div>
      <div id="page-credits" class="page hidden"></div>
      <div id="page-settings" class="page hidden"></div>
    </main>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
